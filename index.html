<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>OSPA — Registrar Horario</title>
<link rel="icon" type="image/png" href="" id="fav"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/brand.css"/>
<link rel="stylesheet" href="css/main.css"/>
<style>
body{-webkit-tap-highlight-color:transparent;}
.inp{min-height:46px;font-size:16px!important;}
.time-inp{font-size:22px!important;min-height:56px;}
.btn-success{min-height:54px;font-size:16px!important;border-radius:14px!important;}
#vEmpresa{display:none!important;}
#vForm{display:block;}
@media(max-width:380px){.fecha-dia-txt{font-size:14px;}.time-inp{font-size:20px!important;}}
</style>
</head>
<body>
<div class="bg-layer" aria-hidden="true"></div>
<div class="app-wrap">

<header class="app-header">
  <div class="app-header__inner">
    <div class="app-header__brand">
      <div class="brand-mark" id="hdrMark"></div>
      <div>
        <div class="brand-name" id="hdrNombre">Control de <span class="brand-gc">Horarios</span></div>
        <span class="brand-sub" id="hdrSub">Panel de registro</span>
      </div>
    </div>
    <div id="hdrEmpBtn" style="display:none;">
    </div>
  </div>
</header>

<main style="max-width:520px;margin:0 auto;padding:20px 14px 80px;">

<!-- ══ VISTA: SELECTOR DE EMPRESA ══ -->
<div id="vEmpresa" class="show">
  <div style="text-align:center;margin-bottom:28px;padding-top:10px;">
    <div style="font-size:28px;font-weight:800;margin-bottom:6px;">Control de <span class="brand-gc">Horarios</span></div>
    <div style="font-size:13px;color:rgba(198,201,215,.5);">Seleccioná tu empresa para continuar</div>
  </div>
  <div style="display:flex;flex-direction:column;gap:14px;">
    <div class="empresa-card" onclick="selEmpresa('ospail')">
      <img src="assets/logos/ospail/logo-full.png" alt="OSPAIL"
        style="height:72px;margin:0 auto 10px;object-fit:contain;"
        onerror="this.outerHTML='<div style=\'font-size:26px;font-weight:900;color:#F26513;margin-bottom:6px;\'>OSPAIL</div>'"/>
      <div style="font-size:13px;color:rgba(198,201,215,.5);">OSPAIL — SOEAIL</div>
    </div>
    <div class="empresa-card" onclick="selEmpresa('ospa')">
      <img src="assets/logos/ospa/logo-full1.png" alt="OSPA"
        style="height:72px;margin:0 auto 10px;object-fit:contain;"
        onerror="this.outerHTML='<div style=\'font-size:26px;font-weight:900;color:#11308C;margin-bottom:6px;\'>OSPA</div>'"/>
      <div style="font-size:13px;color:rgba(198,201,215,.5);">OSPA — STA</div>
    </div>
  </div>
</div>

<!-- ══ VISTA: FORMULARIO DE REGISTRO ══ -->
<div id="vForm">

  <!-- Logo empresa -->
  <div style="text-align:center;margin-bottom:20px;">
    <img id="logoEmp" src="" alt=""
      style="height:64px;margin:0 auto 8px;display:block;object-fit:contain;"
      onerror="this.style.display='none'"/>
    <p id="subEmp" style="color:rgba(198,201,215,.38);font-size:12px;letter-spacing:.03em;"></p>
  </div>

  <!-- BANNER OK -->
  <div id="lOkBanner" style="display:none;margin-bottom:14px;" class="ok-banner">
    <div style="font-size:24px;margin-bottom:4px;">✅</div>
    <div style="font-size:15px;font-weight:800;color:var(--color-success-text);" id="lOkMsg">¡Registrado!</div>
    <div style="font-size:12px;color:rgba(134,239,172,.55);margin-top:3px;">Para cargar otro, completá el formulario y guardá de nuevo.</div>
  </div>

  <!-- COLA DE SESIÓN -->
  <div id="lQSec" style="display:none;margin-bottom:14px;">
    <div style="font-size:11px;font-weight:700;color:rgba(198,201,215,.38);text-transform:uppercase;letter-spacing:.07em;margin-bottom:7px;">
      Esta sesión — <span id="lQCnt">0</span>
    </div>
    <div id="lQList" style="display:flex;flex-direction:column;gap:6px;"></div>
  </div>

  <!-- FORM GLASS -->
  <div class="glass" style="padding:20px;margin-bottom:14px;">
    <h2 style="font-size:19px;font-weight:800;margin-bottom:14px;">
      Registrar <span class="brand-gc">horario</span>
    </h2>

    <!-- FECHA NAV -->
    <div class="fecha-nav">
      <button class="fecha-arr" onclick="cambiarFecha(-1)">‹</button>
      <div class="fecha-center">
        <div class="fecha-dia-txt" id="fechaDia">—</div>
        <div class="fecha-num-txt" id="fechaNum">—</div>
        <button class="fecha-hoy-btn hide" id="btnHoy" onclick="irAHoy()">↩ Hoy</button>
      </div>
      <button class="fecha-arr" onclick="cambiarFecha(+1)">›</button>
    </div>
    <input type="hidden" id="lFecha"/>

    <!-- ÁREA + NOMBRE -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;">
      <div>
        <label class="lbl">Área *</label>
        <select class="inp" id="lArea" onchange="loadPersonal()">
          <option value="">Seleccionar...</option>
        </select>
      </div>
      <div>
        <label class="lbl">Nombre *</label>
        <select class="inp" id="lNom" onchange="onPersonaChange()">
          <option value="">Seleccioná área primero</option>
        </select>
      </div>
    </div>

    <!-- PLAN INFO -->
    <div id="lPlanInfo" class="plan-info" style="display:none;margin-bottom:11px;"></div>

    <!-- PIN -->
    <div style="margin-bottom:10px;">
      <label class="lbl">PIN personal (4 dígitos) *</label>
      <input class="inp" type="password" id="lPin" maxlength="4" inputmode="numeric"
        placeholder="• • • •"
        style="text-align:center;font-size:22px;font-weight:800;letter-spacing:.5rem;"
        oninput="updCalc()"/>
    </div>

    <!-- HORAS TURNO 1 -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;">
      <div>
        <label class="lbl">Entrada *</label>
        <input class="time-inp" type="time" id="lEnt" oninput="updCalc()" onchange="updCalc()"/>
        <div id="lInfoT" style="font-size:11.5px;font-weight:700;margin-top:5px;min-height:16px;"></div>
      </div>
      <div>
        <label class="lbl">Salida <span style="font-size:10px;font-weight:400;opacity:.4;">(opc.)</span></label>
        <input class="time-inp" type="time" id="lSal" oninput="updCalc()" onchange="updCalc()"/>
        <div id="lInfoH" style="font-size:11.5px;font-weight:700;margin-top:5px;min-height:16px;"></div>
      </div>
    </div>

    <!-- TURNO 2 -->
    <div id="turno2Wrap" style="display:none;margin-bottom:10px;padding:10px 12px;
      background:rgba(228,199,106,.06);border:1px solid rgba(228,199,106,.2);border-radius:10px;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
        <div style="font-size:10px;font-weight:800;color:rgba(228,199,106,.7);letter-spacing:.08em;text-transform:uppercase;">✂ 2° Turno</div>
        <button onclick="ocultarTurno2()" style="background:none;border:none;cursor:pointer;font-size:11px;color:rgba(228,199,106,.5);font-weight:700;">✕ Quitar</button>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
        <div><label class="lbl">Entrada 2°</label><input class="time-inp" type="time" id="lEnt2" oninput="updCalc()" onchange="updCalc()"/></div>
        <div><label class="lbl">Salida 2° <span style="font-size:10px;font-weight:400;opacity:.4;">(opc.)</span></label><input class="time-inp" type="time" id="lSal2" oninput="updCalc()" onchange="updCalc()"/></div>
      </div>
    </div>

    <div id="btnAgregar2do" style="margin-bottom:10px;display:none;">
      <button onclick="mostrarTurno2()"
        style="background:rgba(228,199,106,.08);border:1px dashed rgba(228,199,106,.3);
          color:rgba(228,199,106,.6);padding:8px 14px;border-radius:8px;
          font-family:var(--font-title);font-size:12px;font-weight:700;cursor:pointer;width:100%;">
        ✂ Agregar 2° turno
      </button>
    </div>

    <!-- OBS -->
    <div style="margin-bottom:16px;">
      <label class="lbl">Observaciones <span style="font-size:10px;font-weight:400;opacity:.4;">(opcional)</span></label>
      <input class="inp" type="text" id="lObs" placeholder="Notas opcionales..." style="font-size:15px;"/>
    </div>

    <button class="btn btn-success" id="lBtnG" onclick="guardarRegistro()">
      <span id="lBIco">✅</span>&nbsp;<span id="lBTxt">Guardar registro</span>
    </button>
  </div>

  <!-- ACCESO ADMIN -->
  <div style="text-align:center;padding-bottom:10px;">
    <button class="btn btn-ghost" id="btnShowAdmin" onclick="toggleAdmin()"
      style="font-size:12px;padding:7px 18px;opacity:.55;">
      🔐 Acceder como administrador
    </button>
    <div id="adminLoginBox" style="display:none;margin-top:10px;">
      <div class="glass" style="padding:16px 18px;border-radius:14px;">
        <div style="font-size:12px;font-weight:700;margin-bottom:10px;color:rgba(198,201,215,.55);">Panel Administrador</div>
        <div style="display:flex;gap:7px;flex-wrap:wrap;margin-bottom:9px;">
          <input class="inp" type="text" id="aU" placeholder="Usuario"
            style="flex:1;min-width:90px;font-size:15px;"
            onkeydown="if(event.key==='Enter')document.getElementById('aP').focus()"/>
          <input class="inp" type="password" id="aP" placeholder="Contraseña"
            style="flex:1;min-width:90px;font-size:15px;"
            onkeydown="if(event.key==='Enter')loginAdmin()"/>
        </div>
        <button class="btn btn-primary" onclick="loginAdmin()"
          style="width:100%;justify-content:center;padding:11px;font-size:15px;">
          Ingresar →
        </button>
      </div>
    </div>
  </div>

</div><!-- /vForm -->
</main>

<footer class="app-footer no-print">
  <img id="footLogo" src="" alt="" class="footer-logo" onerror="this.style.display='none'"/>
  <span style="opacity:.3;">·</span>
  <span id="footNombre" style="opacity:.4;"></span>
  <span style="opacity:.3;">·</span>
  <span style="opacity:.3;">© 2026</span>
</footer>
</div>
<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/marca.js"></script>
<script src="js/utils.js"></script>
<script src="js/supabase.js"></script>
<script>
/* ═══════════════════════════════════════════════
   INDEX.JS — Registro de horario con detección
   de registro existente y horario planificado
   ═══════════════════════════════════════════════ */
let horarioPlan        = null;
let sessionQueue       = [];
let _offset            = 0;
let _registroExistente = null;
let _empIdActual       = null;
let _nombreCompleto    = null;

const _DIAS  = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
const _MESES = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];

// ── EMPRESA ────────────────────────────────────────────────────────
function selEmpresa(id) {
  aplicarMarca(id);
  initSB(id);
  const emp = MARCA.empresas[id];
  document.getElementById('logoEmp').src = emp.logos.full;
  document.getElementById('subEmp').textContent = emp.nombreCompleto;
  document.getElementById('footLogo').src = emp.logos.blanco;
  document.getElementById('footNombre').textContent = emp.nombreCompleto;
  document.getElementById('hdrMark').style.backgroundImage = `url('${emp.logos.favicon}')`;
  document.getElementById('hdrEmpBtn').style.display = 'flex';
  document.getElementById('vEmpresa').classList.remove('show');
  document.getElementById('vEmpresa').style.display = 'none';
  document.getElementById('vForm').style.display = 'block';
  document.getElementById('vForm').classList.add('show');
  _offset = 0;
  _updFecha();
  cargarAreas();
}

// ── FECHA ──────────────────────────────────────────────────────────
function getFechaActual() {
  const d = new Date(); d.setDate(d.getDate() + _offset);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function _updFecha() {
  const fs = getFechaActual();
  const d  = new Date(fs+'T12:00:00');
  document.getElementById('lFecha').value = fs;
  document.getElementById('fechaDia').textContent = _DIAS[d.getDay()] + ' ' + d.getDate() + ' de ' + _MESES[d.getMonth()];
  document.getElementById('fechaNum').textContent = fs.split('-').reverse().join('/');
  const b = document.getElementById('btnHoy');
  _offset !== 0 ? b.classList.remove('hide') : b.classList.add('hide');
}
function cambiarFecha(d) {
  _offset += d; _updFecha();
  if (_empIdActual) _recargarPersona();
}
function irAHoy() {
  _offset = 0; _updFecha();
  if (_empIdActual) _recargarPersona();
}

// ── AREAS ──────────────────────────────────────────────────────────
async function cargarAreas() {
  const sel = document.getElementById('lArea');
  sel.innerHTML = '<option value="">Seleccionar...</option>';
  if (!SB) return;
  const { data } = await SB.from('areas').select('nombre').eq('activa',true).order('nombre');
  (data||[]).forEach(a => {
    const o = document.createElement('option');
    o.value = a.nombre; o.textContent = a.nombre;
    sel.appendChild(o);
  });
}

// ── PERSONAL ───────────────────────────────────────────────────────
async function loadPersonal() {
  const area = document.getElementById('lArea').value;
  const sel  = document.getElementById('lNom');
  _resetPersona();
  if (!area) { sel.innerHTML='<option value="">Seleccioná área primero</option>'; return; }
  sel.innerHTML = '<option value="">Cargando...</option>';
  const areaId = await _getAreaId(area);
  const { data } = await SB.from('empleados')
    .select('id,nombre,apellido')
    .eq('area_id', areaId).eq('activo',true).order('apellido');
  sel.innerHTML = '<option value="">Seleccionar persona...</option>';
  (data||[]).forEach(p => {
    const o = document.createElement('option');
    // Guardamos id, nombre display y nombre completo para buscar en horarios
    o.value = JSON.stringify({
      id:       p.id,
      display:  `${p.apellido}, ${p.nombre}`,
      fullName: `${p.apellido}, ${p.nombre}`,
    });
    o.textContent = `${p.apellido}, ${p.nombre}`;
    sel.appendChild(o);
  });
}

async function _getAreaId(areaNombre) {
  const { data } = await SB.from('areas').select('id').eq('nombre', areaNombre).maybeSingle();
  return data?.id || null;
}

// ── RESET PERSONA ──────────────────────────────────────────────────
function _resetPersona() {
  horarioPlan = null;
  _registroExistente = null;
  _empIdActual = null;
  _nombreCompleto = null;
  _clearCalc(); _clearPlan(); _clearRegistroInfo();
  document.getElementById('lEnt').value = '';
  document.getElementById('lSal').value = '';
  document.getElementById('lEnt2').value = '';
  document.getElementById('lSal2').value = '';
  document.getElementById('turno2Wrap').style.display = 'none';
  document.getElementById('btnAgregar2do').style.display = 'none';
  document.getElementById('lBTxt').textContent = 'Guardar registro';
  document.getElementById('lBIco').textContent = '✅';
}

async function _recargarPersona() {
  const opt = document.getElementById('lNom').selectedOptions[0];
  if (!opt?.value) return;
  let obj; try { obj = JSON.parse(opt.value); } catch { return; }
  _resetPersona();
  await _cargarDatosPersona(obj);
}

// ── PERSONA CAMBIA ─────────────────────────────────────────────────
async function onPersonaChange() {
  const opt = document.getElementById('lNom').selectedOptions[0];
  _resetPersona();
  if (!opt?.value) return;
  let obj; try { obj = JSON.parse(opt.value); } catch { return; }
  await _cargarDatosPersona(obj);
}

async function _cargarDatosPersona(obj) {
  _empIdActual    = obj.id;
  _nombreCompleto = obj.fullName;
  const fecha     = getFechaActual();

  // Cargar en paralelo: registro existente + horario planificado
  const [regExistente, plan] = await Promise.all([
    _buscarRegistroExistente(obj.id, fecha),
    getHorarioPlanificado(SB, obj.fullName, fecha),
  ]);

  horarioPlan        = plan;
  _registroExistente = regExistente;

  // ── Mostrar horario planificado ──
  const el = document.getElementById('lPlanInfo');
  el.style.display = 'flex';
  el.className = 'plan-info';

  if (!plan) {
    el.innerHTML = '<span style="color:rgba(198,201,215,.45);">Sin horario planificado esta semana.</span>';
  } else if (plan.tipo === 'flex') {
    el.classList.add('plan-flex');
    el.innerHTML = '<span style="color:rgba(198,201,215,.6);">Planificado:</span><strong style="color:#a78bfa;margin-left:5px;">🔄 Flex</strong>';
  } else if (plan.tipo === 'guardia') {
    el.classList.add('plan-guardia');
    el.innerHTML = '<span style="color:rgba(198,201,215,.6);">Planificado:</span><strong style="color:#e4c76a;margin-left:5px;">🛡 Guardia — 1h</strong>';
  } else {
    let html = '<span style="color:rgba(198,201,215,.6);">Planificado:</span>'
      + `<strong style="color:var(--c1);margin-left:5px;">${plan.entrada||'?'}</strong>`
      + (plan.salida ? `<span style="color:rgba(198,201,215,.4);font-size:11px;"> → </span><strong>${plan.salida}</strong>` : '');
    if (plan.entrada2) {
      html += `<span style="color:rgba(228,199,106,.6);margin-left:8px;font-size:11px;">✂</span>`
        + `<strong style="color:#e4c76a;margin-left:4px;font-size:11px;">${plan.entrada2}${plan.salida2?' → '+plan.salida2:''}</strong>`;
    }
    el.innerHTML = html;
  }

  // ── Mostrar registro existente o dejar campos vacíos ──
  if (regExistente) {
    // Ya tiene registro hoy → pre-llenar con lo guardado para actualizar
    _mostrarRegistroExistente(regExistente, plan);
  } else {
    // Primera vez del día → campos vacíos, solo mostrar el plan como referencia
    // Mostrar botón 2° turno si el plan lo tiene
    if (plan?.tipo === 'normal' && (plan.entrada2 || plan.salida2)) {
      document.getElementById('btnAgregar2do').style.display = '';
    } else if (plan?.tipo === 'normal' || !plan) {
      document.getElementById('btnAgregar2do').style.display = '';
    }
    document.getElementById('lBTxt').textContent = 'Guardar registro';
    document.getElementById('lBIco').textContent = '✅';
  }

  updCalc();
}

// ── REGISTRO EXISTENTE ─────────────────────────────────────────────
async function _buscarRegistroExistente(empId, fecha) {
  const { data } = await SB.from('registros_asistencia')
    .select('*')
    .eq('empleado_id', empId)
    .eq('fecha', fecha)
    .order('created_at', { ascending: false })
    .limit(1);
  return data?.[0] || null;
}

function _mostrarRegistroExistente(reg, plan) {
  const entHora = reg.hora_entrada ? new Date(reg.hora_entrada).toTimeString().slice(0,5) : null;
  const salHora = reg.hora_salida  ? new Date(reg.hora_salida).toTimeString().slice(0,5)  : null;

  // Pre-llenar campos con lo que ya está guardado
  if (entHora) document.getElementById('lEnt').value = entHora;
  if (salHora) document.getElementById('lSal').value = salHora;

  // Si hay 2° turno en obs
  if (reg.observaciones?.includes('2° turno:')) {
    const match = reg.observaciones.match(/2° turno: (\d{2}:\d{2})(?:\s*→\s*(\d{2}:\d{2}))?/);
    if (match) {
      document.getElementById('turno2Wrap').style.display = '';
      document.getElementById('btnAgregar2do').style.display = 'none';
      document.getElementById('lEnt2').value = match[1] || '';
      document.getElementById('lSal2').value = match[2] || '';
    }
  } else if (plan?.entrada2) {
    document.getElementById('turno2Wrap').style.display = '';
    document.getElementById('btnAgregar2do').style.display = 'none';
  } else {
    document.getElementById('btnAgregar2do').style.display = '';
  }

  // Banner info
  let wrap = document.getElementById('registroExistenteInfo');
  if (!wrap) {
    wrap = document.createElement('div');
    wrap.id = 'registroExistenteInfo';
    const planInfo = document.getElementById('lPlanInfo');
    planInfo.parentNode.insertBefore(wrap, planInfo.nextSibling);
  }

  const estadoSal = salHora
    ? `<span style="color:var(--c1);font-weight:800;">${salHora}</span>`
    : `<span style="color:#e4c76a;font-weight:800;">Pendiente ⚠</span>`;

  wrap.innerHTML = `
    <div style="background:rgba(107,225,227,.08);border:1px solid rgba(107,225,227,.25);border-radius:10px;padding:10px 14px;margin-bottom:10px;">
      <div style="font-size:11px;font-weight:800;color:var(--c1);letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px;">
        📋 Registro del día encontrado
      </div>
      <div style="display:flex;gap:16px;font-size:13px;flex-wrap:wrap;">
        <div>
          <span style="color:rgba(198,201,215,.5);font-size:10px;display:block;">Entrada</span>
          <span style="color:var(--c1);font-weight:800;">${entHora||'—'}</span>
        </div>
        <div>
          <span style="color:rgba(198,201,215,.5);font-size:10px;display:block;">Salida</span>
          ${estadoSal}
        </div>
        <div>
          <span style="color:rgba(198,201,215,.5);font-size:10px;display:block;">Turno</span>
          <span style="color:rgba(198,201,215,.7);font-size:12px;">${reg.turno||'—'}</span>
        </div>
      </div>
      <div style="font-size:11px;color:rgba(198,201,215,.4);margin-top:6px;">
        ${salHora
          ? 'Modificá los datos y guardá para actualizar.'
          : '⚠ Completá la <strong style="color:#e4c76a;">salida</strong> y guardá.'}
      </div>
    </div>`;

  // Cambiar botón
  document.getElementById('lBTxt').textContent = salHora ? 'Actualizar registro' : 'Registrar salida';
  document.getElementById('lBIco').textContent = salHora ? '✏️' : '🚪';
}

function _clearRegistroInfo() {
  const wrap = document.getElementById('registroExistenteInfo');
  if (wrap) wrap.innerHTML = '';
}

function _clearPlan() {
  const e = document.getElementById('lPlanInfo');
  if (e) { e.style.display='none'; e.innerHTML=''; }
}
function _clearCalc() {
  const it=document.getElementById('lInfoT'), ih=document.getElementById('lInfoH');
  if(it) it.textContent=''; if(ih) ih.innerHTML='';
}

// ── CALCULAR EN VIVO ───────────────────────────────────────────────
function updCalc() {
  const ent = document.getElementById('lEnt').value;
  const sal = document.getElementById('lSal').value;
  const it  = document.getElementById('lInfoT');
  const ih  = document.getElementById('lInfoH');
  if (!it||!ih) return;

  if (horarioPlan?.tipo === 'flex') {
    it.style.color = '#a78bfa'; it.textContent = ent ? '🔄 Horario Flex' : '';
  } else if (horarioPlan?.tipo === 'guardia') {
    it.style.color = '#e4c76a'; it.textContent = ent ? '🛡 Guardia — 1h computable' : '';
  } else if (ent && horarioPlan?.entrada) {
    const diff = calcTard(horarioPlan.entrada, ent);
    const info = tardInfoText(diff);
    it.style.color = info.color; it.textContent = info.text;
  } else if (ent) {
    it.style.color = 'rgba(198,201,215,.5)'; it.textContent = 'Sin planificación para comparar';
  } else { it.textContent = ''; }

  const hs = calcHs(ent, sal);
  if (hs !== null) {
    let extra = '';
    if (horarioPlan?.tipo === 'normal' && horarioPlan?.salida && sal) {
      const ex = calcExtra(horarioPlan.salida, sal);
      if (ex > 0) extra = ` <span style="color:#e4c76a;">(+${ex}m extra)</span>`;
    }
    ih.innerHTML = `⏱ ${fmtHs(hs)} trabajadas${extra}`;
  } else { ih.textContent = ''; }
}

// ── TURNO 2 ────────────────────────────────────────────────────────
function mostrarTurno2() {
  document.getElementById('turno2Wrap').style.display = '';
  document.getElementById('btnAgregar2do').style.display = 'none';
}
function ocultarTurno2() {
  document.getElementById('turno2Wrap').style.display = 'none';
  document.getElementById('btnAgregar2do').style.display = '';
  document.getElementById('lEnt2').value = '';
  document.getElementById('lSal2').value = '';
  updCalc();
}

// ── GUARDAR / ACTUALIZAR ───────────────────────────────────────────
async function guardarRegistro() {
  const area   = document.getElementById('lArea').value;
  const nomSel = document.getElementById('lNom');
  const nomOpt = nomSel.options[nomSel.selectedIndex];
  const ent    = document.getElementById('lEnt').value;
  const sal    = document.getElementById('lSal').value;
  const ent2   = document.getElementById('lEnt2').value;
  const sal2   = document.getElementById('lSal2').value;
  const obs    = document.getElementById('lObs').value.trim();
  const pin    = document.getElementById('lPin').value;
  const fecha  = getFechaActual();

  if (!area || !nomOpt?.value || !ent) {
    showToast('Completá área, nombre y hora de entrada','err'); return;
  }
  if (!pinValido(pin)) {
    showToast('Ingresá tu PIN de 4 dígitos','err'); return;
  }

  let obj; try { obj = JSON.parse(nomOpt.value); } catch {
    showToast('Seleccioná una persona válida','err'); return;
  }

  // Verificar PIN
  const { data: empData, error: pinErr } = await SB.from('empleados')
    .select('id,nombre,apellido').eq('pin', pin).eq('activo', true).limit(1);
  if (pinErr || !empData?.length) {
    showToast('PIN incorrecto','err'); return;
  }

  // Verificar que el PIN corresponde a la persona seleccionada
  if (empData[0].id !== obj.id) {
    showToast('El PIN no corresponde a la persona seleccionada','err'); return;
  }

  const btn = document.getElementById('lBtnG');
  btn.disabled = true;
  document.getElementById('lBIco').textContent = '⏳';
  document.getElementById('lBTxt').textContent = 'Guardando...';

  // Turno string
  let turnoStr = 'Personalizado';
  if (horarioPlan?.tipo === 'flex')    turnoStr = 'Flex';
  else if (horarioPlan?.tipo === 'guardia') turnoStr = 'Guardia';
  else if (horarioPlan?.entrada) {
    turnoStr = horarioPlan.entrada + (horarioPlan.salida ? ' → ' + horarioPlan.salida : '');
  }

  // Tardanza
  let tardanza = null;
  if (horarioPlan?.tipo === 'normal' && horarioPlan?.entrada) {
    tardanza = calcTard(horarioPlan.entrada, ent);
  }

  // Obs con 2° turno
  let obsF = obs || null;
  if (ent2) {
    const t2 = ent2 + (sal2 ? ' → ' + sal2 : '');
    obsF = (obs ? obs + ' | ' : '') + '2° turno: ' + t2;
  }

  const areaId = await _getAreaId(area);
  let error;

  if (_registroExistente) {
    // UPDATE
    ({ error } = await SB.from('registros_asistencia').update({
      hora_entrada:  `${fecha}T${ent}:00`,
      hora_salida:   sal ? `${fecha}T${sal}:00` : null,
      turno:         turnoStr,
      tardanza_min:  tardanza,
      observaciones: obsF,
    }).eq('id', _registroExistente.id));

    btn.disabled = false;
    document.getElementById('lBIco').textContent = '✅';
    document.getElementById('lBTxt').textContent = 'Guardar registro';
    if (error) { showToast('Error al actualizar: ' + error.message, 'err'); return; }

    const msg = sal
      ? `Salida registrada — ${obj.display} — ${sal}`
      : `Entrada actualizada — ${obj.display} — ${ent}`;
    sessionQueue.unshift({ nombre: obj.display, area, hora: sal||ent, turno: turnoStr });

  } else {
    // INSERT
    const fotoBase64 = await capturarSelfie().catch(()=>null);
    ({ error } = await SB.from('registros_asistencia').insert({
      empleado_id:   obj.id,
      fecha,
      hora_entrada:  `${fecha}T${ent}:00`,
      hora_salida:   sal ? `${fecha}T${sal}:00` : null,
      area_id:       areaId,
      foto_entrada:  fotoBase64,
      estado:        'presente',
      observaciones: obsF,
      turno:         turnoStr,
      tardanza_min:  tardanza,
    }));

    btn.disabled = false;
    document.getElementById('lBIco').textContent = '✅';
    document.getElementById('lBTxt').textContent = 'Guardar registro';
    if (error) { showToast('Error: ' + error.message, 'err'); return; }

    sessionQueue.unshift({ nombre: obj.display, area, hora: ent, turno: turnoStr });
  }

  if (sessionQueue.length > 8) sessionQueue.pop();
  _renderCola();
  _showOkBanner(`¡Listo! ${obj.display} — ${sal||ent}`);
  _clearFormAfterSave();
}

function _showOkBanner(msg) {
  const b = document.getElementById('lOkBanner');
  document.getElementById('lOkMsg').textContent = msg;
  b.style.display = 'block';
  setTimeout(() => { b.style.display = 'none'; }, 5000);
}

function _clearFormAfterSave() {
  document.getElementById('lPin').value  = '';
  document.getElementById('lObs').value  = '';
  document.getElementById('lNom').selectedIndex = 0;
  document.getElementById('lArea').selectedIndex = 0;
  _resetPersona();
}

function _renderCola() {
  if (!sessionQueue.length) {
    document.getElementById('lQSec').style.display = 'none'; return;
  }
  document.getElementById('lQSec').style.display = 'block';
  document.getElementById('lQCnt').textContent = sessionQueue.length;
  document.getElementById('lQList').innerHTML = sessionQueue.map(r =>
    `<div class="queue-row">
      <div>
        <span style="font-weight:800;font-size:13px;">${r.nombre}</span>
        <span style="font-size:11px;color:rgba(198,201,215,.45);margin-left:8px;">${r.area}</span>
      </div>
      <div style="display:flex;align-items:center;gap:8px;">
        <span style="font-size:13px;font-weight:800;color:var(--c1);">${r.hora}</span>
        <span class="badge badge-c1" style="font-size:10px;">${r.turno}</span>
      </div>
    </div>`
  ).join('');
}

async function loginAdmin() {
  const u = document.getElementById('aU').value.trim();
  const p = document.getElementById('aP').value;
  const empId = sessionStorage.getItem('empresaActiva');
  const c = EMPRESA.admin;
  if (c && c.user===u && c.pass===p) {
    sessionStorage.setItem('adminSesion', JSON.stringify({ empresaId:empId, rol:'admin', ts:Date.now() }));
    window.location.href = 'admin.html';
  } else {
    showToast('Credenciales incorrectas','err');
  }
}
